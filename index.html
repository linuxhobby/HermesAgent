<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CLI 速查工具箱</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f6f8fa; color: #1f2328;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem 1rem;
  }
  .container { max-width: 520px; width: 100%; text-align: center; }
  h1 { font-size: 28px; font-weight: 600; margin-bottom: 0.35rem; }
  .subtitle { font-size: 15px; color: #656d76; margin-bottom: 2rem; }
  .cards { display: flex; flex-direction: column; gap: 14px; }
  .card {
    display: flex; align-items: center; gap: 16px;
    background: #fff; border: 1px solid #d0d7de; border-radius: 12px;
    padding: 20px 24px; text-decoration: none; color: inherit;
    transition: all 0.15s;
  }
  .card:hover { border-color: #0969da; box-shadow: 0 4px 12px rgba(9,105,218,0.10); transform: translateY(-2px); }
  .card:active { transform: translateY(0); }
  .card-icon {
    width: 48px; height: 48px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .icon-hermes { background: linear-gradient(135deg, #6e40c9, #8957e5); color: #fff; }
  .icon-tailscale { background: linear-gradient(135deg, #2463eb, #4c8dff); color: #fff; }
  .card-body { text-align: left; }
  .card-title { font-size: 17px; font-weight: 600; color: #1f2328; margin-bottom: 3px; }
  .card-desc { font-size: 14px; color: #656d76; }
  footer { margin-top: 2.5rem; font-size: 12px; color: #8c959f; }
  @media (prefers-color-scheme: dark) {
    body { background: #0d1117; color: #e6edf3; }
    .card { background: #161b22; border-color: #30363d; }
    .card:hover { border-color: #58a6ff; box-shadow: 0 4px 12px rgba(88,166,255,0.08); }
    .card-title { color: #e6edf3; }
    .subtitle, .card-desc { color: #8b949e; }
    footer { color: #484f58; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🛠 CLI 速查工具箱</h1>
  <p class="subtitle">快速查找常用命令</p>
  <div class="cards">
    <a class="card" href="hermes-commands.html">
      <div class="card-icon icon-hermes">🤖</div>
      <div class="card-body">
        <div class="card-title">Hermes Agent 指令速查</div>
        <div class="card-desc">Hermes Agent 常用命令与操作参考</div>
      </div>
    </a>
    <a class="card" href="tailscale-command.html">
      <div class="card-icon icon-tailscale">🌐</div>
      <div class="card-body">
        <div class="card-title">Tailscale CLI Reference</div>
        <div class="card-desc">Tailscale 命令行工具速查</div>
      </div>
    </a>
  </div>
  <footer>本地运行 · 点击卡片进入对应工具页</footer>
</div>
</body>
</html>
