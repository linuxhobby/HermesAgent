function copyToClipboard(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.textContent = '已复制：' + text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1600);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const toast = document.getElementById('toast');
    toast.textContent = '已复制';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1400);
  });
}

function render(q) {
  const container = document.getElementById('content');
  q = (q || '').toLowerCase().trim();
  let html = '';
  let any = false;

  data.forEach(section => {
    const items = q
      ? section.items.filter(i =>
          (i.cmd || i.label || '').toLowerCase().includes(q) ||
          (i.desc || '').toLowerCase().includes(q)
        )
      : section.items;
    if (!items.length) return;
    any = true;

    // 信息块（标签说明 / 动态路由）
    if (section.type === 'info') {
      html += `<div class="section"><div class="section-title">${section.cat}</div><div class="info-box">`;
      items.forEach(i => {
        html += `<div class="info-item"><span class="info-label">${i.label || ''}</span><span class="info-text">${i.desc}</span></div>`;
      });
      html += `</div></div>`;
      return;
    }

    // 普通命令卡片
    html += `<div class="section"><div class="section-title">${section.cat}</div><div class="cmd-grid">`;
    items.forEach(i => {
      const displayCmd = i.cmd;
      html += `<div class="cmd-card" title="点击命令复制">
        <span class="cmd-name clickable" data-cmd="${displayCmd.replace(/"/g, '&quot;')}">${displayCmd}</span>
        <span class="cmd-desc">${i.desc}</span>
      </div>`;
    });
    html += `</div></div>`;
  });

  if (!any) html = `<div class="no-result">未找到匹配的命令或描述</div>`;
  container.innerHTML = html;

  // bind click copy
  container.querySelectorAll('.cmd-name.clickable').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopImmediatePropagation();
      const cmd = el.getAttribute('data-cmd');
      copyToClipboard(cmd, el);
    });
  });
}

function filter() {
  render(document.getElementById('search').value);
}

render('');

// Keyboard: press / to focus search (like many CLIs)
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement.tagName === 'BODY') {
    e.preventDefault();
    document.getElementById('search').focus();
    document.getElementById('search').select();
  }
  if (e.key === 'Escape' && document.activeElement.id === 'search') {
    document.getElementById('search').blur();
  }
});
